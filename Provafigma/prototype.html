<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Readiness — Prototipo Interattivo</title>
    <meta name="description" content="Prototipo interattivo di Readiness: app per la preparazione professionale a colloqui, talk e presentazioni." />
    <!-- PWA / iOS fullscreen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Readiness" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100dvh; background: #F2F1ED; overflow: hidden; }
      #root { width: 100%; height: 100dvh; }

      /* iOS "Add to Home Screen" banner */
      #ios-hint {
        display: none;
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
        background: #0A0A0A; color: #fff;
        padding: 14px 20px 28px;
        font-family: -apple-system, sans-serif;
        font-size: 13px; line-height: 1.45;
        text-align: center;
        border-top: 1px solid rgba(255,255,255,0.1);
      }
      #ios-hint strong { color: #E8FF5A; }
      #ios-hint-close {
        position: absolute; top: 10px; right: 16px;
        background: none; border: none; color: rgba(255,255,255,0.5);
        font-size: 18px; cursor: pointer; line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- iOS Add to Home hint (shows only in Safari, not in standalone/PWA mode) -->
    <div id="ios-hint">
      <button id="ios-hint-close" onclick="document.getElementById('ios-hint').style.display='none'">×</button>
      Per <strong>schermo intero</strong> su iPhone:<br/>
      tocca <strong>Condividi ⬆</strong> → <strong>Aggiungi a schermata Home</strong>
    </div>
    <script>
      // Show iOS hint only in Safari (not already in standalone / PWA mode)
      var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      var isStandalone = window.navigator.standalone === true;
      var isSafari = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios/i.test(navigator.userAgent);
      if (isIOS && isSafari && !isStandalone) {
        document.getElementById('ios-hint').style.display = 'block';
      }
    </script>
    <script type="module" src="/src/prototype-main.tsx"></script>
  </body>
</html>
